<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Watch - Xello</title>
  <meta name="description" content="Watch movies and TV shows on Xello"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
  <script src="sources.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.10.3/cdn.min.js" defer></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:hsl(240,6%,7%);--fg:hsl(0,0%,95%);
      --card:hsl(240,5%,10%);--card-fg:hsl(0,0%,95%);
      --primary:hsl(270,70%,60%);--primary-fg:hsl(0,0%,100%);
      --secondary:hsl(240,4%,16%);--secondary-fg:hsl(0,0%,85%);
      --muted:hsl(240,4%,14%);--muted-fg:hsl(240,5%,55%);
      --border:hsl(240,4%,18%);--radius:0.75rem;
    }
    body{background:var(--bg);color:var(--fg);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
    h1,h2,h3,h4,h5,h6{font-family:'Space Grotesk',sans-serif}
    a{color:inherit;text-decoration:none}
    .container{max-width:1280px;margin:0 auto}
    .text-gradient{background:linear-gradient(to right,var(--primary),hsl(270,80%,70%));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .glass-card{background:hsla(240,5%,10%,0.6);backdrop-filter:blur(24px);border:1px solid hsla(240,4%,18%,0.5)}
    .glow-border{box-shadow:0 0 20px -5px hsla(270,70%,60%,0.15)}

    /* NAV */
    nav{position:fixed;top:0;left:0;right:0;z-index:50;border-bottom:1px solid hsla(240,4%,18%,0.3);animation:slideDown .4s ease;background:var(--bg)}
    @keyframes slideDown{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
    .nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px;padding:0 1.5rem}
    .nav-brand{display:flex;align-items:center;gap:8px;cursor:pointer}
    .nav-brand span{font-size:1.25rem;font-weight:700;font-family:'Space Grotesk',sans-serif}
    .nav-links{display:flex;gap:4px}
    .nav-links button{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:8px;border:none;background:transparent;color:var(--muted-fg);font-size:.875rem;font-weight:500;cursor:pointer;transition:all .2s}
    .nav-links button:hover,.nav-links button.active{background:hsla(270,70%,60%,0.1);color:var(--primary)}
    .nav-right{display:flex;align-items:center;gap:8px}
    .icon-btn{width:40px;height:40px;border-radius:8px;border:none;background:transparent;color:var(--muted-fg);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .icon-btn:hover{color:var(--fg);background:var(--secondary)}
    .search-box{display:flex;align-items:center;background:var(--secondary);border-radius:8px;padding:0 12px;height:40px;gap:8px;overflow:hidden;transition:width .25s;width:0;opacity:0}
    .search-box.open{width:200px;opacity:1}
    .search-box input{flex:1;background:transparent;border:none;outline:none;color:var(--fg);font-size:.875rem;min-width:0}
    .search-box input::placeholder{color:var(--muted-fg)}

    /* MOBILE MENU */
    .hamburger{display:none}
    .mobile-overlay{display:none;position:fixed;inset:0;z-index:40;background:hsla(240,6%,7%,0.6);backdrop-filter:blur(4px)}
    .mobile-menu{position:fixed;top:0;right:0;bottom:0;z-index:41;width:260px;padding:80px 24px 24px;display:flex;flex-direction:column;gap:8px;transform:translateX(100%);transition:transform .3s ease;background:var(--bg)}
    .mobile-menu.open{transform:translateX(0)}
    .mobile-menu button{display:flex;align-items:center;gap:12px;width:100%;padding:12px 16px;border-radius:12px;border:none;background:transparent;color:var(--muted-fg);font-size:.875rem;font-weight:500;cursor:pointer;transition:all .2s}
    .mobile-menu button:hover,.mobile-menu button.active{background:hsla(270,70%,60%,0.1);color:var(--primary)}
    @media(max-width:768px){.nav-links{display:none}.hamburger{display:flex}}

    /* PLAYER */
    .player-section{background:var(--card);border-radius:16px;padding:24px;margin-bottom:32px;animation:fadeUp .4s ease}
    .player-wrapper{position:relative;width:100%;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:12px;background:var(--bg);margin-bottom:16px}
    .player-wrapper iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
    .player-controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:16px}
    .control-group{display:flex;flex-direction:column;gap:6px}
    .control-group label{font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted-fg)}
    .control-group select{background:var(--secondary);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--fg);font-size:.875rem;cursor:pointer;transition:all .2s}
    .control-group select:hover{border-color:var(--primary)}
    .control-group select:focus{outline:none;border-color:var(--primary)}
    .player-actions{display:flex;gap:8px;flex-wrap:wrap}
    .action-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;font-size:.875rem;font-weight:500;cursor:pointer;transition:all .2s}
    .action-btn.primary{background:var(--primary);color:var(--primary-fg)}
    .action-btn.primary:hover{opacity:.9}
    .action-btn.secondary{background:var(--secondary);color:var(--secondary-fg);border:1px solid var(--border)}
    .action-btn.secondary:hover{background:hsla(240,4%,16%,0.8)}

    /* CONTENT INFO */
    .content-grid{display:grid;grid-template-columns:1fr;gap:24px}
    @media(min-width:768px){.content-grid{grid-template-columns:1fr 300px}}
    .content-main{display:flex;flex-direction:column;gap:24px}
    .content-card{background:var(--card);border-radius:16px;padding:24px;animation:fadeUp .4s ease}
    .content-card h2{font-size:1.5rem;font-weight:700;margin-bottom:16px;color:var(--fg)}
    .content-card p{font-size:.875rem;line-height:1.6;color:var(--secondary-fg)}

    /* TITLE SECTION */
    .title-section h1{font-size:2rem;font-weight:700;margin-bottom:12px}
    .meta-info{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:16px}
    .meta-tag{display:flex;align-items:center;gap:4px;padding:4px 12px;border-radius:9999px;font-size:.75rem;font-weight:600;background:hsla(270,70%,60%,0.1);color:var(--primary)}
    .rating-badge{display:flex;align-items:center;gap:4px;padding:6px 12px;border-radius:8px;background:hsla(270,70%,60%,0.1);color:var(--primary);font-weight:600}

    /* SIDEBAR */
    .content-sidebar{display:flex;flex-direction:column;gap:16px}
    .poster-box{border-radius:12px;overflow:hidden;aspect-ratio:2/3;background:var(--secondary)}
    .poster-box img{width:100%;height:100%;object-fit:cover}
    .sidebar-card{background:var(--card);border-radius:12px;padding:16px}
    .sidebar-card h3{font-size:.875rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted-fg);margin-bottom:8px}
    .sidebar-card p{font-size:.875rem;color:var(--secondary-fg)}

    /* CAST */
    .cast-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:12px;margin-top:12px}
    .cast-item{text-align:center}
    .cast-avatar{width:100%;aspect-ratio:1;border-radius:8px;overflow:hidden;background:var(--secondary);margin-bottom:8px}
    .cast-avatar img{width:100%;height:100%;object-fit:cover}
    .cast-name{font-size:.75rem;font-weight:600;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cast-role{font-size:.7rem;color:var(--muted-fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    /* LOADING */
    .loading{display:flex;align-items:center;justify-content:center;height:400px;gap:12px}
    .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* MAIN */
    main{padding:96px 1.5rem 64px;display:flex;flex-direction:column;gap:24px}

    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  </style>
</head>
<body x-data="watchApp()">
  <!-- NAV -->
  <nav>
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <span class="text-gradient">Xello</span>
      </a>
      <div class="nav-links">
        <button @click="$navigate('/')">Browse</button>
        <button @click="$navigate('/')">Watch Later</button>
      </div>
      <div class="nav-right">
        <a href="/" class="icon-btn">
          <svg class="icon" viewBox="0 0 24 24" width="20" height="20">
            <path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
        </a>
        <button class="hamburger" @click="mobileMenuOpen = !mobileMenuOpen">
          <svg class="icon" viewBox="0 0 24 24" width="20" height="20">
            <path d="M3 12h18M3 6h18M3 18h18"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="mobile-overlay" :class="mobileMenuOpen && 'open'" @click="mobileMenuOpen = false"></div>
    <div class="mobile-menu" :class="mobileMenuOpen && 'open'">
      <button @click="mobileMenuOpen = false">Browse</button>
      <button @click="mobileMenuOpen = false">Watch Later</button>
    </div>
  </nav>

  <!-- MAIN -->
  <main>
    <template x-if="loading">
      <div class="loading">
        <div class="spinner"></div>
        <span>Loading...</span>
      </div>
    </template>

    <template x-if="!loading && content">
      <!-- PLAYER SECTION -->
      <div class="player-section">
        <div class="player-wrapper">
          <iframe :src="currentVideoUrl" allowfullscreen allow="autoplay"></iframe>
        </div>

        <!-- CONTROLS -->
        <div class="player-controls">
          <div class="control-group">
            <label>Source</label>
            <select @change="updateVideoUrl()" x-model="selectedSource">
              <template x-for="source in availableSources" :key="source.id">
                <option :value="source.id" x-text="source.name + ' (' + source.category + ')'"></option>
              </template>
            </select>
          </div>

          <template x-if="isShow">
            <div class="control-group">
              <label>Season</label>
              <select @change="updateEpisodes()" x-model="selectedSeason">
                <template x-for="season in seasons" :key="season">
                  <option :value="season" x-text="'Season ' + season"></option>
                </template>
              </select>
            </div>

            <div class="control-group">
              <label>Episode</label>
              <select @change="updateVideoUrl()" x-model="selectedEpisode">
                <template x-for="episode in episodes" :key="episode">
                  <option :value="episode" x-text="'Episode ' + episode"></option>
                </template>
              </select>
            </div>
          </template>
        </div>

        <!-- ACTIONS -->
        <div class="player-actions">
          <button class="action-btn primary" @click="toggleWatchLater()">
            <span x-show="!isInWatchLater()">+ Add to Watch Later</span>
            <span x-show="isInWatchLater()">✓ In Watch Later</span>
          </button>
        </div>
      </div>

      <!-- CONTENT INFO -->
      <div class="content-grid">
        <div class="content-main">
          <!-- TITLE -->
          <div class="content-card title-section">
            <h1 x-text="content.title || content.name"></h1>
            <div class="meta-info">
              <div class="rating-badge">
                <span>⭐</span>
                <span x-text="content.vote_average?.toFixed(1)"></span>
              </div>
              <span class="meta-tag" x-text="isShow ? content.first_air_date?.split('-')[0] : content.release_date?.split('-')[0]"></span>
              <template x-for="genre in content.genres?.slice(0, 3)" :key="genre.id">
                <span class="meta-tag" x-text="genre.name"></span>
              </template>
            </div>
          </div>

          <!-- OVERVIEW -->
          <div class="content-card">
            <h2>Overview</h2>
            <p x-text="content.overview"></p>
          </div>

          <!-- CAST -->
          <template x-if="content.credits?.cast?.length > 0">
            <div class="content-card">
              <h2>Cast</h2>
              <div class="cast-grid">
                <template x-for="actor in content.credits.cast.slice(0, 12)" :key="actor.id">
                  <div class="cast-item">
                    <div class="cast-avatar">
                      <img :src="actor.profile_path ? 'https://image.tmdb.org/t/p/w200' + actor.profile_path : 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect fill=%22%23333%22 width=%22200%22 height=%22200%22/%3E%3C/svg%3E'" :alt="actor.name">
                    </div>
                    <div class="cast-name" :title="actor.name" x-text="actor.name"></div>
                    <div class="cast-role" :title="actor.character" x-text="actor.character"></div>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>

        <!-- SIDEBAR -->
        <div class="content-sidebar">
          <!-- POSTER -->
          <template x-if="content.poster_path">
            <div class="poster-box">
              <img :src="'https://image.tmdb.org/t/p/w300' + content.poster_path" :alt="content.title || content.name">
            </div>
          </template>

          <!-- DETAILS -->
          <div class="sidebar-card">
            <h3>Status</h3>
            <p x-text="content.status"></p>
          </div>

          <template x-if="!isShow">
            <div class="sidebar-card">
              <h3>Runtime</h3>
              <p x-text="content.runtime + ' min'"></p>
            </div>
          </template>

          <template x-if="isShow">
            <div class="sidebar-card">
              <h3>Seasons</h3>
              <p x-text="content.number_of_seasons"></p>
            </div>
            <div class="sidebar-card">
              <h3>Episodes</h3>
              <p x-text="content.number_of_episodes"></p>
            </div>
          </template>

          <div class="sidebar-card">
            <h3>Language</h3>
            <p x-text="content.original_language?.toUpperCase()"></p>
          </div>
        </div>
      </div>
    </template>
  </main>

  <script>
    function watchApp() {
      return {
        apiKey: '1070730380f5fee0d87cf0382670b255',
        content: null,
        contentId: null,
        contentType: null,
        isShow: false,
        selectedSeason: 1,
        selectedEpisode: 1,
        seasons: [],
        episodes: [],
        selectedSource: localStorage.getItem('defaultSource') || 'embedsu',
        availableSources: typeof availableSources !== 'undefined' ? availableSources : [],
        currentVideoUrl: '',
        watchLaterItems: [],
        loading: true,
        mobileMenuOpen: false,

        async init() {
          if (typeof availableSources !== 'undefined') {
            this.availableSources = availableSources;
          }

          const savedItems = localStorage.getItem('watchLater');
          if (savedItems) {
            this.watchLaterItems = JSON.parse(savedItems);
          }

          const urlParams = new URLSearchParams(window.location.search);
          this.contentId = urlParams.get('id');
          this.contentType = urlParams.get('type');
          this.isShow = this.contentType === 'tv';

          if (this.contentId && this.contentType) {
            await this.fetchContent();
            if (this.isShow) {
              await this.fetchSeasons();
            }
            this.updateVideoUrl();
          }
          this.loading = false;
        },

        async fetchContent() {
          const url = `https://api.themoviedb.org/3/${this.contentType}/${this.contentId}?api_key=${this.apiKey}&append_to_response=credits`;
          try {
            const response = await fetch(url);
            this.content = await response.json();
          } catch (error) {
            console.error('Error fetching content:', error);
          }
        },

        async fetchSeasons() {
          if (!this.isShow) return;
          const url = `https://api.themoviedb.org/3/tv/${this.contentId}?api_key=${this.apiKey}`;
          try {
            const response = await fetch(url);
            const data = await response.json();
            this.seasons = Array.from({length: data.number_of_seasons}, (_, i) => i + 1);
            await this.updateEpisodes();
          } catch (error) {
            console.error('Error fetching seasons:', error);
          }
        },

        async updateEpisodes() {
          if (!this.isShow) return;
          const url = `https://api.themoviedb.org/3/tv/${this.contentId}/season/${this.selectedSeason}?api_key=${this.apiKey}`;
          try {
            const response = await fetch(url);
            const data = await response.json();
            this.episodes = Array.from({length: data.episodes.length}, (_, i) => i + 1);
            this.selectedEpisode = 1;
            this.updateVideoUrl();
          } catch (error) {
            console.error('Error fetching episodes:', error);
          }
        },

        updateVideoUrl() {
          const source = this.availableSources.find(s => s.id === this.selectedSource);
          if (!source) return;

          let url = source.urls[this.contentType];
          url = url.replace('{id}', this.contentId);

          if (this.isShow) {
            url = url.replace('{season}', this.selectedSeason).replace('{episode}', this.selectedEpisode);
          }

          this.currentVideoUrl = url;
          localStorage.setItem('defaultSource', this.selectedSource);
        },

        toggleWatchLater() {
          if (this.isInWatchLater()) {
            this.watchLaterItems = this.watchLaterItems.filter(item => item.id !== this.content.id);
          } else {
            this.watchLaterItems.push({
              id: this.content.id,
              title: this.content.title || this.content.name,
              type: this.contentType,
              poster: this.content.poster_path
            });
          }
          localStorage.setItem('watchLater', JSON.stringify(this.watchLaterItems));
        },

        isInWatchLater() {
          return this.watchLaterItems.some(item => item.id === this.content?.id);
        }
      }
    }
  </script>
</body>
</html>
