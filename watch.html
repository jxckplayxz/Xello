<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Watch - Xello</title>
  <meta name="description" content="Watch movies and TV shows on Xello"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
  <script src="sources.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.10.3/cdn.min.js" defer></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:hsl(240,6%,7%);--fg:hsl(0,0%,95%);
      --card:hsl(240,5%,10%);--card-fg:hsl(0,0%,95%);
      --primary:hsl(270,70%,60%);--primary-fg:hsl(0,0%,100%);
      --secondary:hsl(240,4%,16%);--secondary-fg:hsl(0,0%,85%);
      --muted:hsl(240,4%,14%);--muted-fg:hsl(240,5%,55%);
      --border:hsl(240,4%,18%);--radius:0.75rem;
    }
    body{background:var(--bg);color:var(--fg);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
    h1,h2,h3,h4,h5,h6{font-family:'Space Grotesk',sans-serif}
    a{color:inherit;text-decoration:none}
    .container{max-width:1280px;margin:0 auto;padding:0 1.5rem}
    .text-gradient{background:linear-gradient(to right,var(--primary),hsl(270,80%,70%));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .glass-card{background:hsla(240,5%,10%,0.6);backdrop-filter:blur(24px);border:1px solid hsla(240,4%,18%,0.5)}
    .glow-border{box-shadow:0 0 20px -5px hsla(270,70%,60%,0.15)}

    /* NAV */
    nav{position:fixed;top:0;left:0;right:0;z-index:50;border-bottom:1px solid hsla(240,4%,18%,0.3);animation:slideDown .4s ease;background:var(--bg)}
    @keyframes slideDown{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
    .nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px;padding:0 1.5rem}
    .nav-brand{display:flex;align-items:center;gap:8px;cursor:pointer}
    .nav-brand span{font-size:1.25rem;font-weight:700;font-family:'Space Grotesk',sans-serif}
    .nav-links{display:flex;gap:4px}
    .nav-links button{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:8px;border:none;background:transparent;color:var(--muted-fg);font-size:.875rem;font-weight:500;cursor:pointer;transition:all .2s}
    .nav-links button:hover,.nav-links button.active{background:hsla(270,70%,60%,0.1);color:var(--primary)}
    .nav-right{display:flex;align-items:center;gap:8px}
    .icon-btn{width:40px;height:40px;border-radius:8px;border:none;background:transparent;color:var(--muted-fg);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .icon-btn:hover{color:var(--fg);background:var(--secondary)}
    .hamburger{display:none}
    @media(max-width:768px){.nav-links{display:none}.hamburger{display:flex}}

    /* MAIN */
    main{padding:96px 0 64px;animation:fadeIn .4s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

    /* PLAYER SECTION */
    .player-section{margin-bottom:48px}
    .player-container{position:relative;width:100%;padding-bottom:56.25%;background:var(--secondary);border-radius:12px;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.3);animation:fadeUp .5s ease}
    .player-container iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
    .player-controls{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px;animation:fadeUp .6s ease;padding:0 1.5rem}
    
    /* SOURCE SELECTOR */
    .source-selector{display:flex;flex-direction:column;gap:8px}
    .source-label{font-size:.875rem;font-weight:600;color:var(--muted-fg);text-transform:uppercase;letter-spacing:.5px}
    .source-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}
    .source-btn{padding:12px;border-radius:8px;border:1px solid hsla(240,4%,18%,0.5);background:var(--secondary);color:var(--secondary-fg);font-size:.875rem;font-weight:500;cursor:pointer;transition:all .2s;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .source-btn:hover{background:hsla(240,4%,16%,0.8);border-color:var(--primary)}
    .source-btn.active{background:var(--primary);color:var(--primary-fg);border-color:var(--primary)}

    /* EPISODE SELECTOR */
    .episode-selector{display:flex;flex-direction:column;gap:8px}
    .selector-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .select-control{display:flex;flex-direction:column;gap:4px}
    .select-control label{font-size:.75rem;font-weight:600;color:var(--muted-fg);text-transform:uppercase;letter-spacing:.5px}
    .select-control select{padding:10px 12px;border-radius:8px;border:1px solid hsla(240,4%,18%,0.5);background:var(--secondary);color:var(--fg);font-size:.875rem;cursor:pointer;transition:all .2s}
    .select-control select:hover{border-color:var(--primary)}
    .select-control select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px hsla(270,70%,60%,0.1)}

    /* CONTENT DETAILS */
    .content-details{display:grid;grid-template-columns:300px 1fr;gap:32px;animation:fadeUp .7s ease;margin-bottom:48px;padding:0 1.5rem}
    .poster-section{display:flex;flex-direction:column;gap:16px}
    .poster{width:100%;aspect-ratio:2/3;border-radius:12px;background:var(--secondary);overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.3)}
    .poster img{width:100%;height:100%;object-fit:cover}
    .action-buttons{display:flex;flex-direction:column;gap:8px}
    .action-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 16px;border-radius:8px;border:none;font-weight:600;cursor:pointer;transition:all .2s;font-size:.875rem}
    .action-btn.primary{background:var(--primary);color:var(--primary-fg)}
    .action-btn.primary:hover{opacity:.9}
    .action-btn.secondary{background:var(--secondary);color:var(--secondary-fg);border:1px solid hsla(240,4%,18%,0.5)}
    .action-btn.secondary:hover{background:hsla(240,4%,16%,0.8)}

    /* INFO SECTION */
    .info-section{display:flex;flex-direction:column;gap:24px}
    .info-header{display:flex;flex-direction:column;gap:8px}
    .info-header h1{font-size:2rem;font-weight:700;line-height:1.2}
    .info-meta{display:flex;align-items:center;gap:16px;flex-wrap:wrap;font-size:.875rem;color:var(--muted-fg)}
    .meta-item{display:flex;align-items:center;gap:6px}
    .rating{display:flex;align-items:center;gap:4px;color:var(--primary);font-weight:600}

    /* DESCRIPTION */
    .description{display:flex;flex-direction:column;gap:8px}
    .description-label{font-size:.875rem;font-weight:600;color:var(--muted-fg);text-transform:uppercase;letter-spacing:.5px}
    .description-text{line-height:1.6;color:var(--secondary-fg);font-size:.95rem}

    /* CAST SECTION */
    .cast-section{margin-top:48px;animation:fadeUp .8s ease;padding:0 1.5rem}
    .section-title{font-size:1.5rem;font-weight:700;margin-bottom:16px}
    .cast-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px}
    .cast-card{display:flex;flex-direction:column;gap:12px;border-radius:12px;overflow:hidden;background:var(--card);transition:all .2s}
    .cast-card:hover{transform:translateY(-4px);box-shadow:0 10px 30px rgba(0,0,0,.3)}
    .cast-image{width:100%;aspect-ratio:2/3;background:var(--secondary);overflow:hidden}
    .cast-image img{width:100%;height:100%;object-fit:cover}
    .cast-info{padding:12px}
    .cast-name{font-weight:600;font-size:.875rem;line-height:1.3}
    .cast-role{font-size:.75rem;color:var(--muted-fg);line-height:1.3}

    /* RECOMMENDATIONS */
    .recommendations{margin-top:48px;animation:fadeUp .9s ease;padding:0 1.5rem}
    .recommendations-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}
    .rec-card{position:relative;border-radius:12px;overflow:hidden;background:var(--secondary);cursor:pointer;transition:all .2s;aspect-ratio:2/3}
    .rec-card:hover{transform:scale(1.05);box-shadow:0 10px 30px rgba(0,0,0,.3)}
    .rec-card img{width:100%;height:100%;object-fit:cover}
    .rec-overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent,rgba(0,0,0,.8));display:flex;align-items:flex-end;padding:12px;opacity:0;transition:opacity .2s}
    .rec-card:hover .rec-overlay{opacity:1}
    .rec-title{font-size:.875rem;font-weight:600;line-height:1.2;color:var(--fg)}

    /* RESPONSIVE */
    @media(max-width:1024px){
      .content-details{grid-template-columns:1fr;gap:24px}
      .poster-section{max-width:300px}
    }
    @media(max-width:768px){
      main{padding:80px 0 48px}
      .player-controls{grid-template-columns:1fr;gap:12px;padding:0 1.5rem}
      .source-grid{grid-template-columns:repeat(auto-fit,minmax(100px,1fr))}
      .cast-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
      .recommendations-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
      .info-header h1{font-size:1.5rem}
      .content-details{padding:0 1.5rem}
      .cast-section{padding:0 1.5rem}
      .recommendations{padding:0 1.5rem}
    }
  </style>
</head>
<body>
  <div x-data="watchApp()" x-init="init()">
    <!-- NAV -->
    <nav>
      <div class="nav-inner">
        <div class="nav-brand" onclick="window.location.href='index.html'">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="23 7 16 12 23 17 23 7"></polygon>
            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
          </svg>
          <span>Xello</span>
        </div>
        <div class="nav-links">
          <button onclick="window.location.href='index.html'">
            <svg class="icon" width="16" height="16" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M7 2v20M2 12h5M17 2v20M19 12h3"/></svg>
            Movies
          </button>
          <button onclick="window.location.href='index.html'">
            <svg class="icon" width="16" height="16" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="15" rx="2"/><path d="M17 2l-5 5-5-5"/></svg>
            TV Shows
          </button>
          <button onclick="window.location.href='https://xello-streams.vercel.app/livesports.html'">
            <svg class="icon" width="16" height="16" viewBox="0 0 24 24"><path d="M6 9H4.5a2.5 2.5 0 010-5C7 4 7 9 7 9M18 9h1.5a2.5 2.5 0 000-5C17 4 17 9 17 9"/><path d="M4 22h16"/><path d="M10 22V2h4v20"/></svg>
            Live Sports
          </button>
        </div>
        <div class="nav-right">
          <button class="icon-btn" onclick="window.location.href='index.html#watchlater'">
            <svg class="icon" width="20" height="20" viewBox="0 0 24 24"><path d="M19 21l-7-4-7 4V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
          </button>
          <button class="icon-btn" onclick="window.location.href='settings.html'">
            <svg class="icon" width="20" height="20" viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m5.08 5.08l4.24 4.24M1 12h6m6 0h6M4.22 19.78l4.24-4.24m5.08-5.08l4.24-4.24"/></svg>
          </button>
          <button class="icon-btn hamburger" @click="toggleMobile()">
            <svg class="icon" width="20" height="20" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
        </div>
      </div>
    </nav>

    <!-- MAIN -->
    <main class="container">
      <!-- PLAYER SECTION -->
      <div class="player-section">
        <div class="player-container">
          <iframe :src="playerUrl" allowfullscreen="" allow="autoplay"></iframe>
        </div>
        
        <div class="player-controls">
          <div class="source-selector">
            <div class="source-label">Streaming Source</div>
            <div class="source-grid">
              <template x-for="source in availableSources" :key="source.id">
                <button 
                  class="source-btn" 
                  :class="{ active: selectedSource === source.id }"
                  @click="selectSource(source.id)"
                  x-text="source.name">
                </button>
              </template>
            </div>
          </div>

          <template x-if="contentType === 'tv'">
            <div class="episode-selector">
              <div class="source-label">Episode Selection</div>
              <div class="selector-row">
                <div class="select-control">
                  <label>Season</label>
                  <select x-model="selectedSeason" @change="updatePlayer()">
                    <template x-for="s in totalSeasons" :key="s">
                      <option :value="s" x-text="'Season ' + s"></option>
                    </template>
                  </select>
                </div>
                <div class="select-control">
                  <label>Episode</label>
                  <select x-model="selectedEpisode" @change="updatePlayer()">
                    <template x-for="e in totalEpisodes" :key="e">
                      <option :value="e" x-text="'Episode ' + e"></option>
                    </template>
                  </select>
                </div>
              </div>
            </div>
          </template>
        </div>
      </div>

      <!-- CONTENT DETAILS -->
      <div class="content-details">
        <div class="poster-section">
          <div class="poster">
            <img :src="'https://image.tmdb.org/t/p/w500' + content.poster_path" :alt="content.title || content.name"/>
          </div>
          <div class="action-buttons">
            <button class="action-btn primary" @click="toggleWatchLater()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 21l-7-4-7 4V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
              <span x-text="isInWatchLater ? 'Remove from List' : 'Add to Watch Later'"></span>
            </button>
            <button class="action-btn secondary" @click="shareContent()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
              Share
            </button>
          </div>
        </div>

        <div class="info-section">
          <div class="info-header">
            <h1 x-text="content.title || content.name"></h1>
            <div class="info-meta">
              <div class="meta-item" x-show="content.release_date">
                <span x-text="new Date(content.release_date).getFullYear()"></span>
              </div>
              <div class="meta-item" x-show="content.vote_average">
                <div class="rating">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 10.26 24 10.35 17.77 16.01 19.91 24.59 12 18.93 4.09 24.59 6.23 16.01 0 10.35 8.91 10.26"/></svg>
                  <span x-text="content.vote_average.toFixed(1)"></span>
                </div>
              </div>
              <div class="meta-item" x-show="content.runtime">
                <span x-text="content.runtime + ' min'"></span>
              </div>
              <div class="meta-item" x-show="content.number_of_seasons">
                <span x-text="content.number_of_seasons + ' seasons'"></span>
              </div>
            </div>
          </div>

          <div class="description" x-show="content.overview">
            <div class="description-label">Synopsis</div>
            <div class="description-text" x-text="content.overview"></div>
          </div>

          <div class="description" x-show="content.genres && content.genres.length">
            <div class="description-label">Genres</div>
            <div class="description-text">
              <template x-for="genre in content.genres" :key="genre.id">
                <span x-text="genre.name + (content.genres[content.genres.length - 1].id === genre.id ? '' : ', ')"></span>
              </template>
            </div>
          </div>
        </div>
      </div>

      <!-- CAST SECTION -->
      <div class="cast-section" x-show="cast.length > 0">
        <h2 class="section-title">Cast</h2>
        <div class="cast-grid">
          <template x-for="member in cast.slice(0, 12)" :key="member.id">
            <div class="cast-card">
              <div class="cast-image" x-show="member.profile_path">
                <img :src="'https://image.tmdb.org/t/p/w500' + member.profile_path" :alt="member.name"/>
              </div>
              <div class="cast-info">
                <div class="cast-name" x-text="member.name"></div>
                <div class="cast-role" x-text="member.character || 'Cast Member'"></div>
              </div>
            </div>
          </template>
        </div>
      </div>

      <!-- RECOMMENDATIONS -->
      <div class="recommendations" x-show="recommendations.length > 0">
        <h2 class="section-title">Similar Titles</h2>
        <div class="recommendations-grid">
          <template x-for="item in recommendations.slice(0, 12)" :key="item.id">
            <div class="rec-card" @click="openContent(item)">
              <img :src="'https://image.tmdb.org/t/p/w500' + item.poster_path" :alt="item.title || item.name"/>
              <div class="rec-overlay">
                <div class="rec-title" x-text="item.title || item.name"></div>
              </div>
            </div>
          </template>
        </div>
      </div>
    </main>
  </div>

  <script>
    function watchApp() {
      return {
        content: {},
        cast: [],
        recommendations: [],
        contentType: 'movie',
        contentId: null,
        selectedSource: localStorage.getItem('defaultSource') || 'embedsu',
        selectedSeason: 1,
        selectedEpisode: 1,
        totalSeasons: 10,
        totalEpisodes: 10,
        isInWatchLater: false,
        playerUrl: '',
        availableSources: availableSources,

        async init() {
          const params = new URLSearchParams(window.location.search);
          this.contentId = params.get('id');
          this.contentType = params.get('type') || 'movie';

          if (!this.contentId) {
            window.location.href = 'index.html';
            return;
          }

          await this.loadContent();
          await this.loadCast();
          await this.loadRecommendations();
          this.updatePlayer();
          this.checkWatchLater();
        },

        async loadContent() {
          try {
            const response = await fetch(
              `https://api.themoviedb.org/3/${this.contentType}/${this.contentId}?api_key=8265bd1679663a7ea12ac168da84d1e9&language=en-US`
            );
            this.content = await response.json();
            
            if (this.contentType === 'tv') {
              this.totalSeasons = this.content.number_of_seasons || 1;
              this.totalEpisodes = this.content.seasons?.[0]?.episode_count || 10;
            }
          } catch (e) {
            console.error('Failed to load content:', e);
          }
        },

        async loadCast() {
          try {
            const response = await fetch(
              `https://api.themoviedb.org/3/${this.contentType}/${this.contentId}/credits?api_key=8265bd1679663a7ea12ac168da84d1e9`
            );
            const data = await response.json();
            this.cast = data.cast || [];
          } catch (e) {
            console.error('Failed to load cast:', e);
          }
        },

        async loadRecommendations() {
          try {
            const response = await fetch(
              `https://api.themoviedb.org/3/${this.contentType}/${this.contentId}/recommendations?api_key=8265bd1679663a7ea12ac168da84d1e9&language=en-US`
            );
            const data = await response.json();
            this.recommendations = data.results || [];
          } catch (e) {
            console.error('Failed to load recommendations:', e);
          }
        },

        selectSource(sourceId) {
          this.selectedSource = sourceId;
          localStorage.setItem('defaultSource', sourceId);
          this.updatePlayer();
        },

        updatePlayer() {
          const source = availableSources.find(s => s.id === this.selectedSource);
          if (!source) return;

          let url = source.urls[this.contentType];
          url = url.replace('{id}', this.contentId);
          
          if (this.contentType === 'tv') {
            url = url.replace('{season}', this.selectedSeason).replace('{episode}', this.selectedEpisode);
          }
          
          this.playerUrl = url;
        },

        toggleWatchLater() {
          let watchLater = JSON.parse(localStorage.getItem('watchLater') || '[]');
          const index = watchLater.findIndex(item => item.id === this.contentId && item.type === this.contentType);
          
          if (index > -1) {
            watchLater.splice(index, 1);
          } else {
            watchLater.push({
              id: this.contentId,
              type: this.contentType,
              title: this.content.title || this.content.name,
              poster: this.content.poster_path
            });
          }
          
          localStorage.setItem('watchLater', JSON.stringify(watchLater));
          this.checkWatchLater();
        },

        checkWatchLater() {
          const watchLater = JSON.parse(localStorage.getItem('watchLater') || '[]');
          this.isInWatchLater = watchLater.some(item => item.id === this.contentId && item.type === this.contentType);
        },

        shareContent() {
          const title = this.content.title || this.content.name;
          const text = `Check out "${title}" on Xello!`;
          
          if (navigator.share) {
            navigator.share({ title, text, url: window.location.href });
          } else {
            alert('Share: ' + text);
          }
        },

        openContent(item) {
          const type = item.media_type === 'tv' ? 'tv' : 'movie';
          window.location.href = `watch.html?id=${item.id}&type=${type}`;
        },

        toggleMobile() {
          // Mobile menu toggle if needed
        }
      };
    }
  </script>
</body>
</html>
