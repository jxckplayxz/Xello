<!DOCTYPE html>
<html lang="en">
<head>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-HGL07M90WG"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-HGL07M90WG');

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xello</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.13.0/cdn.min.js" defer></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="sources.js"></script>

<style>
body {
    background:#0b0b0b;
    font-family: Arial, sans-serif;
}

/* NAVBAR COMPACT */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 1000;
    backdrop-filter: blur(12px);
    background: rgba(0,0,0,0.85);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 1rem;
    gap: 0.5rem;
    box-sizing: border-box;
}

/* HERO */
.hero {
    height: 75vh;
    display:flex;
    align-items:flex-end;
    padding:50px;
    background-size:cover;
    background-position:center;
    position:relative;
}
.hero::after {
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(to top, #0b0b0b 10%, transparent 80%);
}

/* ROW */
.row {
    display:flex;
    overflow-x:auto;
    gap:12px;
    scroll-behavior:smooth;
}
.row::-webkit-scrollbar { display:none; }

/* CARD */
.movie {
    transition: all 0.3s ease;
    border-radius:8px;
}
.movie:hover {
    transform: scale(1.15);
    box-shadow:0 10px 30px rgba(255,0,80,0.5);
}

/* FADE */
.fade {
    animation: fade 0.8s ease;
}
@keyframes fade {
    from {opacity:0; transform:translateY(20px)}
    to {opacity:1; transform:translateY(0)}
}

/* SEARCH */
.search {
    transition: all 0.3s ease;
    border-radius:6px;
    border:1px solid #555;
    background: rgba(0,0,0,0.6);
    padding: 0.25rem 0.5rem;
    width: 0;
}
.search:focus {
    width: 120px;
}

/* BUTTONS */
.nav-btn {
    display: flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.25rem 0.5rem;
    border-radius: 6px;
    transition: all 0.2s;
    font-size: 0.875rem;
}
.nav-btn:hover {
    background: rgba(255,255,255,0.1);
}
</style>
</head>

<body x-data="app()" class="text-white fade">

<!-- DULL LOADING SCREEN -->
<div id="loading" style="position:fixed; inset:0; background:black; color:white; display:flex; align-items:center; justify-content:center; z-index:2000; font-family:Arial, sans-serif; font-size:20px;">
    Loading...
</div>

<script>
window.addEventListener('load', () => {
    document.getElementById('loading').remove();
});
</script>

<!-- NAVBAR -->
<div class="navbar">

    <div class="flex items-center gap-2">
        <h1 class="text-red-600 text-xl font-bold">XELLO</h1>

        <button class="nav-btn" @click="currentTab='movies'; loadHome()">
            <i data-lucide="film" class="w-4 h-4"></i> Movies
        </button>
        <button class="nav-btn" @click="currentTab='tv'; loadHome()">
            <i data-lucide="tv" class="w-4 h-4"></i> TV Shows
        </button>
    </div>

    <div class="flex items-center gap-2">
        <!-- SEARCH ICON / INPUT -->
        <div x-data="{ open:false }" class="relative flex items-center">
            <button @click="open=!open" class="sm:hidden text-gray-300 p-1 rounded hover:bg-gray-700 transition">
                <i data-lucide="search" class="w-5 h-5"></i>
            </button>

            <input x-show="open || window.innerWidth >= 640"
                   x-transition
                   x-model="search"
                   @input.debounce.300ms="searchContent()"
                   placeholder="Search"
                   class="search sm:block absolute sm:relative right-0 sm:right-auto w-0 sm:w-24 focus:w-36 transition-all sm:transition-none">
        </div>

        <!-- SETTINGS LINK -->
        <a href="/settings.html" class="hover:rotate-12 transition">
            <i data-lucide="settings" class="w-5 h-5"></i>
        </a>
    </div>
</div>

<!-- HERO -->
<div class="hero mt-16 fade"
    :style="'background-image:url(https://image.tmdb.org/t/p/original'+featured.backdrop_path+')'">

    <div class="relative z-10 max-w-xl">
        <h1 class="text-4xl font-bold" x-text="featured.title || featured.name"></h1>
        <p class="mt-2 text-gray-300 text-sm" x-text="featured.overview"></p>

        <button @click="play(featured)"
            class="flex items-center gap-2 bg-red-600 text-white px-4 py-1 mt-3 rounded hover:scale-105 hover:bg-red-700 transition text-sm">
            <i data-lucide="play" class="w-4 h-4"></i> Play
        </button>
    </div>
</div>

<!-- CONTINUE -->
<div class="px-4 mt-4 fade" x-show="continueWatching.length">
    <h2 class="text-lg mb-2">Continue Watching</h2>
    <div class="row">
        <template x-for="m in continueWatching">
            <img class="movie w-32 cursor-pointer"
                :src="'https://image.tmdb.org/t/p/w500'+m.poster_path"
                @click="play(m)">
        </template>
    </div>
</div>

<!-- TRENDING -->
<div class="px-4 mt-4 fade">
    <h2 class="text-lg mb-2">Trending</h2>
    <div class="row">
        <template x-for="m in trending">
            <img class="movie w-32 cursor-pointer"
                :src="'https://image.tmdb.org/t/p/w500'+m.poster_path"
                @click="play(m)">
        </template>
    </div>
</div>

<!-- GENRES -->
<template x-for="g in genres">
<div class="px-4 mt-4 fade">
    <h2 class="text-lg mb-2" x-text="g.name"></h2>
    <div class="row">
        <template x-for="m in g.items">
            <img class="movie w-32 cursor-pointer"
                :src="'https://image.tmdb.org/t/p/w500'+m.poster_path"
                @click="play(m)">
        </template>
    </div>
</div>
</template>

<script>
function app(){
return{
apiKey:'1070730380f5fee0d87cf0382670b255',
currentTab:'movies',
featured:{},
trending:[],
genres:[],
search:'',
continueWatching:JSON.parse(localStorage.getItem('cw')||'[]'),
watchAgain:JSON.parse(localStorage.getItem('wa')||'[]'),

async loadHome(){
let type=this.currentTab==='movies'?'movie':'tv';
let t=await fetch(`https://api.themoviedb.org/3/trending/${type}/week?api_key=${this.apiKey}`);
this.trending=(await t.json()).results;
this.featured=this.trending[0];

let g=await fetch(`https://api.themoviedb.org/3/genre/${type}/list?api_key=${this.apiKey}`);
let genres=(await g.json()).genres;
this.genres=[];
for(let genre of genres.slice(0,5)){
let res=await fetch(`https://api.themoviedb.org/3/discover/${type}?api_key=${this.apiKey}&with_genres=${genre.id}`);
let data=await res.json();
this.genres.push({name:genre.name,items:data.results});
}
},

async searchContent(){
if(!this.search) return this.loadHome();
let type=this.currentTab==='movies'?'movie':'tv';
let res=await fetch(`https://api.themoviedb.org/3/search/${type}?api_key=${this.apiKey}&query=${this.search}`);
this.trending=(await res.json()).results;
},

play(item){
this.continueWatching.unshift(item);
localStorage.setItem('cw',JSON.stringify(this.continueWatching));
window.location.href=`watch.html?id=${item.id}&type=${this.currentTab}`;
},

init(){this.loadHome(); setTimeout(()=>lucide.createIcons(),100);}
}}
</script>

</body>
</html>
