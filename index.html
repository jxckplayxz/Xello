    <style>
        /* Netflix-Specific Styles */
        body {
            background-color: #141414; /* Netflix Signature Black */
            font-family: 'Poppins', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* Netflix Loading Screen */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.5s ease;
        }

        .netflix-loader {
            width: 100px;
            height: 100px;
            border-left: 5px solid #e50914;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Hero Banner Gradient */
        .hero-banner {
            background: linear-gradient(to bottom, rgba(20,20,20,0) 0%, rgba(20,20,20,1) 100%), 
                        url('https://image.tmdb.org/t/p/original/your-hero-image.jpg');
            background-size: cover;
            height: 85vh;
            display: flex;
            align-items: center;
        }

        /* Row Hover Animation (Netflix Style) */
        .netflix-card {
            transition: transform 0.3s ease;
        }
        .netflix-card:hover {
            transform: scale(1.1);
            z-index: 50;
        }

        /* Glass Nav Updates */
        .nav-scrolled {
            background: #141414 !important;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* Include your original custom animations */
        @keyframes slide-down { 0% { transform: translateY(-100%); } 100% { transform: translateY(0); } }
        .animate-slide-down { animation: slide-down 0.5s ease-out; }
    </style>
</head>

<body x-data="app()" x-init="setTimeout(() => loading = false, 2000)">

    <div id="loading-screen" x-show="loading" x-transition:leave="opacity-0">
        <div class="netflix-loader"></div>
    </div>

    <nav class="fixed w-full z-50 transition-all duration-300 px-6 py-4" 
         :class="{ 'nav-scrolled': scrolled }"
         @scroll.window="scrolled = (window.pageYOffset > 50)">
        <div class="container mx-auto flex items-center justify-between">
            <div class="flex items-center space-x-10">
                <span class="text-3xl font-extrabold text-red-600 tracking-tighter">XELLO</span>
                <div class="hidden md:flex space-x-6 text-sm font-medium">
                    <button @click="currentTab = 'movies'; fetchContent()" :class="currentTab === 'movies' ? 'text-white' : 'text-gray-400'">Movies</button>
                    <button @click="currentTab = 'shows'; fetchContent()" :class="currentTab === 'shows' ? 'text-white' : 'text-gray-400'">TV Shows</button>
                    <a href="livesports.html" class="text-gray-400 hover:text-white">Live Sports</a>
                </div>
            </div>
            
            <div class="flex items-center space-x-6">
                <div class="relative">
                    <input type="text" x-model="searchQuery" @keyup.debounce.300ms="searchContent()" 
                           placeholder="Titles, genres..." 
                           class="bg-black border border-white text-xs px-3 py-1.5 focus:w-64 transition-all duration-300 outline-none rounded">
                </div>
                <a href="settings.html" class="text-gray-400 hover:text-white">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">

                    </svg>
                </a>
            </div>
        </div>
    </nav>

    <header class="hero-banner px-6 lg:px-12">
        <div class="max-w-2xl mt-20">
            <h1 class="text-6xl font-extrabold mb-4 uppercase tracking-tighter" x-text="currentTab === 'movies' ? 'Trending Movies' : 'Hot TV Shows'"></h1>
            <p class="text-lg text-gray-200 mb-8 line-clamp-3">
                [span_1](start_span)Experience the latest premium content aggregated across all platforms. xello breaks down the paywall for you[span_1](end_span).
            </p>
            <div class="flex space-x-4">
                <button @click="pickRandom()" class="bg-white text-black px-8 py-3 rounded-md font-bold flex items-center hover:bg-opacity-80 transition">
                    <span class="mr-2 text-2xl">▶</span> Play Random
                </button>
                <button @click="showWatchLater = true" class="bg-gray-500 bg-opacity-50 text-white px-8 py-3 rounded-md font-bold hover:bg-opacity-40 transition">
                    ⓘ Watch Later (<span x-text="watchLaterCount"></span>)
                </button>
            </div>
        </div>
    </header>

    <section class="px-6 lg:px-12 -mt-20 relative z-20 pb-10">
        <div class="flex flex-wrap gap-4 mb-6">
            <select x-model="selectedGenre" @change="applyFilters()" class="bg-[#141414] border border-gray-600 text-white text-sm px-4 py-2 rounded">
                <option value="">All Genres</option>
                <template x-for="genre in genres" :key="genre.id">
                    <option :value="genre.id" x-text="genre.name"></option>
                </template>
            </select>

            <select x-model="minRating" @change="applyFilters()" class="bg-[#141414] border border-gray-600 text-white text-sm px-4 py-2 rounded">
                <option value="">Any Rating</option>
                <option value="8">8+ ⭐</option>
                <option value="7">7+ ⭐</option>
            </select>

            </div>

        <h2 class="text-2xl font-bold mb-4" x-text="currentTab === 'movies' ? 'Popular Movies' : 'Popular TV Shows'"></h2>
        
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-2">
            <template x-for="item in filteredContent" :key="item.id">
                <div class="relative netflix-card aspect-[2/3] bg-gray-900 rounded-sm overflow-hidden group cursor-pointer">
                    <a :href="'watch.html?id=' + item.id + '&type=' + (currentTab === 'movies' ? 'movie' : 'tv')">
                        <img :src="'https://image.tmdb.org/t/p/w500' + item.poster_path" 
                             class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-black opacity-0 group-hover:opacity-100 transition-opacity p-4 flex flex-col justify-end">
                            <h3 class="font-bold text-sm" x-text="item.title || item.name"></h3>
                            <p class="text-xs text-purple-400" x-text="'⭐ ' + item.vote_average"></p>
                        </div>
                    </a>
                </div>
            </template>
        </div>

        <div class="mt-12 flex items-center justify-center space-x-8">
            <button @click="currentPage > 1 && changePage(currentPage - 1)" class="text-gray-400 hover:text-white">← Previous</button>
            <span class="text-sm">Page <span x-text="currentPage"></span></span>
            <button @click="changePage(currentPage + 1)" class="text-gray-400 hover:text-white">Next →</button>
        </div>
    </section>
