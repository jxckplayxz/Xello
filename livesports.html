<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xello - Live Sports</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            margin: 0;
            background: #0f172a;
            overflow: hidden;
        }

        .glass {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
        }

        /* FULLSCREEN FIX */
        .iframe-container {
            position: fixed;
            top: 70px; /* navbar height */
            left: 0;
            width: 100%;
            height: calc(100vh - 70px);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body class="text-white font-sans">

<!-- NAVBAR -->
<header class="glass fixed w-full top-0 z-50 px-6 py-4 flex justify-between items-center">
    <h1 class="text-xl font-semibold text-purple-400">Xello</h1>
</header>

<!-- FULLSCREEN IFRAME -->
<div class="iframe-container">
    <iframe src="https://yallajournal.com/"></iframe>
</div>

</body>
</html>
